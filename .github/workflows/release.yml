name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '批量申请 ${{ github.ref_name }}'
          releaseBody: |
            自动构建发布。

            ### 下载说明
            - **macOS (Apple Silicon)**: 下载 `.dmg` (aarch64) 文件
            - **macOS (Intel)**: 下载 `.dmg` (x64) 文件
            - **Windows (安装版)**: 下载 `.msi` 或 `.exe` 安装包
            - **Windows (免安装版)**: 下载 `BatchApply-portable-x64.exe`，双击即可运行
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Rename macOS release assets to tag version
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_tag="${{ github.ref_name }}"
          display_version="${release_tag#v}"
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          original_dmg="$(find "$bundle_dir" -maxdepth 1 -name '*.dmg' -type f | head -n 1)"
          if [ -z "$original_dmg" ]; then
            echo "No dmg bundle found in $bundle_dir" >&2
            exit 1
          fi

          case "${{ matrix.target }}" in
            aarch64-apple-darwin) renamed_dmg="BatchApply_${display_version}_aarch64.dmg" ;;
            x86_64-apple-darwin) renamed_dmg="BatchApply_${display_version}_x64.dmg" ;;
            *) echo "Unsupported macOS target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac

          original_name="$(basename "$original_dmg")"
          cp "$original_dmg" "$renamed_dmg"
          gh release delete-asset "$release_tag" "$original_name" --yes || true
          gh release upload "$release_tag" "$renamed_dmg" --clobber

      - name: Rename Windows installer assets to tag version
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $releaseTag = "${{ github.ref_name }}"
          $displayVersion = $releaseTag -replace '^v', ''
          $bundleRoot = "src-tauri/target/${{ matrix.target }}/release/bundle"

          $msi = Get-ChildItem "$bundleRoot/msi/*.msi" -File | Select-Object -First 1
          if (-not $msi) {
            Write-Error "MSI bundle not found under $bundleRoot/msi"
          }

          $setupExe = Get-ChildItem "$bundleRoot/nsis/*-setup.exe" -File | Select-Object -First 1
          if (-not $setupExe) {
            Write-Error "NSIS setup exe not found under $bundleRoot/nsis"
          }

          $renamedMsi = "BatchApply_${displayVersion}_x64_zh-CN.msi"
          $renamedSetupExe = "BatchApply_${displayVersion}_x64-setup.exe"

          Copy-Item $msi.FullName $renamedMsi
          Copy-Item $setupExe.FullName $renamedSetupExe

          gh release delete-asset $releaseTag $msi.Name --yes
          gh release delete-asset $releaseTag $setupExe.Name --yes
          gh release upload $releaseTag $renamedMsi $renamedSetupExe --clobber

      - name: Upload portable exe (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $exe = Get-ChildItem "$releaseDir/usersxiaodocumentscodevisit-batch-submitter.exe" -ErrorAction SilentlyContinue
          if (-not $exe) {
            Write-Host "Exe not found by package name, searching release dir..."
            $exe = Get-ChildItem "$releaseDir/*.exe" -File | Where-Object { $_.Name -notmatch '(build-script|deps)' } | Select-Object -First 1
          }
          Write-Host "Found: $($exe.FullName)"
          Copy-Item $exe.FullName "BatchApply-portable-x64.exe"
          gh release upload ${{ github.ref_name }} BatchApply-portable-x64.exe --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
